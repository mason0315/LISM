server:
  port: 8080

spring:
  application:
    name: gateway-service

  config:
    import:
      - optional:nacos:gateway-service.yml

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
      config:
        server-addr: localhost:8848
        file-extension: yml

    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # 路由配置
      routes:
        # 认证服务 - 不需要JWT认证
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0

        # 用户服务
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**
          filters:
            - StripPrefix=0
            - name: JwtAuthenticationFilter

        # 图书服务
        - id: book-service
          uri: lb://book-service
          predicates:
            - Path=/book/**
          filters:
            - StripPrefix=0
            - name: JwtAuthenticationFilter

        # 借阅服务
        - id: borrow-service
          uri: lb://borrow-service
          predicates:
            - Path=/borrowrecord/**
          filters:
            - StripPrefix=0
            - name: JwtAuthenticationFilter

        # 评论服务
        - id: comment-service
          uri: lb://comment-service
          predicates:
            - Path=/comments/**
          filters:
            - StripPrefix=0
            - name: JwtAuthenticationFilter

        # 货架服务
        - id: shelves-service
          uri: lb://shelves-service
          predicates:
            - Path=/shelves/**
          filters:
            - StripPrefix=0
            - name: JwtAuthenticationFilter

        # 留言服务
        - id: suggestion-service
          uri: lb://suggestion-service
          predicates:
            - Path=/suggestion/**
          filters:
            - StripPrefix=0
            - name: JwtAuthenticationFilter

        # 人脸识别服务
        - id: face-service
          uri: lb://face-service
          predicates:
            - Path=/face/**
          filters:
            - StripPrefix=0
            - name: JwtAuthenticationFilter

# 日志配置
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO

#  actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
